<section class="award-details-page">
  <div *ngIf="isLoading" class="state-box">Ładowanie pucharu...</div>
  <div *ngIf="!isLoading && errorMessage" class="state-box error">
    {{ errorMessage }}
  </div>

  <mat-card class="details-card" *ngIf="!isLoading && season && award">
    <div class="details-inner">
      <div class="details-header">
        <h1>{{ season.seasonName }}</h1>
      </div>

      <div class="details-top">
        <div class="trophy-column">
          <img
            [src]="getAwardImagePath()"
            [alt]="award.name"
            class="trophy-image"
          />
          <div class="award-type">{{ award.name }}</div>
        </div>
      </div>

      <div class="winner-section">
        <div class="winner-list">
          <a
            *ngFor="let player of award.players"
            class="winner-link"
            [routerLink]="['/player', player.id]"
          >
            {{ player.displayName }}
          </a>
        </div>

        <div class="awarded-date">
          Nagroda przyznana {{ getCreatedAtText(award.createdAt) }}
        </div>
      </div>

      <div class="actions-row">
        <a class="back-link" routerLink="/gablota">przejdź do Gabloty ›</a>
      </div>
    </div>
  </mat-card>
</section>
